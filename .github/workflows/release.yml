name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' plugins/warp/.claude-plugin/plugin.json > tmp.json && mv tmp.json plugins/warp/.claude-plugin/plugin.json
          jq --arg v "$VERSION" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/warp/.claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "Bump plugin version to ${GITHUB_REF_NAME#v}" || true
          git push origin HEAD:main

      - run: make test

      - name: Build binaries
        run: make dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/claude-warp-darwin-amd64
            dist/claude-warp-darwin-arm64
            dist/claude-warp-linux-amd64
            dist/claude-warp-linux-arm64
            dist/claude-warp-windows-amd64.exe
            dist/claude-warp-windows-arm64.exe
